<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WS Relay Tester - 2x2</title>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            font-family: sans-serif;
            background-color: #f0f2f5;
        }
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 20px;
            height: 100%;
            padding: 20px;
            box-sizing: border-box;
        }
        .panel {
            border: 1px solid #ccc;
            padding: 15px;
            border-radius: 8px;
            box-sizing: border-box;
            background-color: #fff;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
        h2 { margin-top: 0; }

        .input-group { display: flex; gap: 8px; margin-bottom: 10px; }
        .input-group input { flex-grow: 1; width: 100px; }
        .input-group button { flex-shrink: 0; width: 100px; }

        input, button { padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }

        .logs {
            flex-grow: 1;
            overflow-y: scroll;
            border: 1px solid #eee;
            padding: 10px;
            background: #f9f9f9;
            white-space: pre-wrap;
            border-radius: 4px;
        }
        .log-msg { margin: 0 0 5px 0; font-size: 0.9em; }
        .log-msg.sent { color: #00529B; }
        .log-msg.received { color: #4F8A10; }
        .log-msg.error { color: #D8000C; }
        .log-msg.info { color: #555; }
    </style>
</head>
<body>

<div class="container">
    <div class="panel">
        <h2>Agent 1</h2>
        <div class="input-group">
            <input type="text" id="agent1-host" placeholder="Host" value="localhost">
            <input type="text" id="agent1-port" placeholder="Port" value="11169">
            <input type="text" id="agent1-token" placeholder="Token" value="token-A">
            <button id="agent1-connect">Connect</button>
        </div>
        <div class="input-group">
            <input type="text" id="agent1-msg" placeholder="Message to send">
            <button id="agent1-send">Send</button>
        </div>
        <div class="logs" id="agent1-logs"></div>
    </div>
    <div class="panel">
        <h2>Agent 2</h2>
        <div class="input-group">
            <input type="text" id="agent2-host" placeholder="Host" value="localhost">
            <input type="text" id="agent2-port" placeholder="Port" value="11169">
            <input type="text" id="agent2-token" placeholder="Token" value="token-B">
            <button id="agent2-connect">Connect</button>
        </div>
        <div class="input-group">
            <input type="text" id="agent2-msg" placeholder="Message to send">
            <button id="agent2-send">Send</button>
        </div>
        <div class="logs" id="agent2-logs"></div>
    </div>
    <div class="panel">
        <h2>Client 1</h2>
        <div class="input-group">
            <input type="text" id="client1-host" placeholder="Host" value="localhost">
            <input type="text" id="client1-port" placeholder="Port" value="11169">
            <input type="text" id="client1-token" placeholder="Token" value="token-A">
            <button id="client1-connect">Connect</button>
        </div>
        <div class="input-group">
            <input type="text" id="client1-msg" placeholder="Message to send">
            <button id="client1-send">Send</button>
        </div>
        <div class="logs" id="client1-logs"></div>
    </div>
    <div class="panel">
        <h2>Client 2</h2>
        <div class="input-group">
            <input type="text" id="client2-host" placeholder="Host" value="localhost">
            <input type="text" id="client2-port" placeholder="Port" value="11169">
            <input type="text" id="client2-token" placeholder="Token" value="token-B">
            <button id="client2-connect">Connect</button>
        </div>
        <div class="input-group">
            <input type="text" id="client2-msg" placeholder="Message to send">
            <button id="client2-send">Send</button>
        </div>
        <div class="logs" id="client2-logs"></div>
    </div>
</div>

<script>
    function setupWebSocket(instanceId) {
        const type = instanceId.startsWith('agent') ? 'agent' : 'client';

        const hostInput = document.getElementById(`${instanceId}-host`);
        const portInput = document.getElementById(`${instanceId}-port`);
        const tokenInput = document.getElementById(`${instanceId}-token`);
        const connectBtn = document.getElementById(`${instanceId}-connect`);
        const msgInput = document.getElementById(`${instanceId}-msg`);
        const sendBtn = document.getElementById(`${instanceId}-send`);
        const logsDiv = document.getElementById(`${instanceId}-logs`);

        let ws = null;

        function log(message, className = 'info') {
            const p = document.createElement('p');
            p.className = `log-msg ${className}`;
            p.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logsDiv.appendChild(p);
            logsDiv.scrollTop = logsDiv.scrollHeight;
        }

        connectBtn.addEventListener('click', () => {
            if (ws) {
                ws.close();
                return;
            }

            const host = hostInput.value.trim();
            const port = portInput.value.trim();
            const token = tokenInput.value.trim();

            if (!host || !port || !token) {
                log('Host, Port, and Token are required.', 'error');
                return;
            }

            const url = `ws://${host}:${port}?token=${token}&type=${type}`;
            ws = new WebSocket(url);
            log(`Connecting to ${url}...`);

            ws.onopen = () => {
                log('Connection established.', 'info');
                connectBtn.textContent = `Disconnect`;
            };

            ws.onmessage = (event) => {
                if (event.data instanceof Blob) {
                    event.data.text().then(text => {
                        log(`Received: ${text}`, 'received');
                    });
                } else {
                    log(`Received: ${event.data}`, 'received');
                }
            };

            ws.onclose = () => {
                log('Connection closed.', 'info');
                connectBtn.textContent = `Connect`;
                ws = null;
            };

            ws.onerror = (error) => {
                log('WebSocket error.', 'error');
                console.error(`[${instanceId}] WebSocket Error:`, error);
            };
        });

        sendBtn.addEventListener('click', () => {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                log('Not connected.', 'error');
                return;
            }
            const msg = msgInput.value;
            if (!msg) return;

            ws.send(msg);
            log(`Sent: ${msg}`, 'sent');
            msgInput.value = '';
        });
    }

    setupWebSocket('agent1');
    setupWebSocket('agent2');
    setupWebSocket('client1');
    setupWebSocket('client2');
</script>

</body>
</html>
